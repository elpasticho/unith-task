version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: unith
      POSTGRES_PASSWORD: unith
      POSTGRES_DB: unith
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unith"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.db.session
    environment:
      DATABASE_URL: postgresql+asyncpg://unith:unith@postgres:5432/unith
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://unith:unith@postgres:5432/unith
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ENRICHMENT_PROVIDER: mock
      WEBHOOK_HMAC_SECRET_LENGTH: "32"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.consumer.rabbitmq
    environment:
      DATABASE_URL: postgresql+asyncpg://unith:unith@postgres:5432/unith
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ENRICHMENT_PROVIDER: mock
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  delivery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.delivery.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://unith:unith@postgres:5432/unith
      DELIVERY_MAX_ATTEMPTS: "10"
      DELIVERY_POLL_INTERVAL: "5"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  receiver:
    build:
      context: .
      dockerfile: Dockerfile.receiver
    ports:
      - "9001:9001"

volumes:
  pg_data:
